<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 700 16px Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px Arial, sans-serif; fill: #374151; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #4B5563; }
      .line { stroke: #374151; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7C3AED; stroke-width: 3; fill: none; stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="620" fill="#FFFCF5"/>
  <text x="40" y="42" class="title">DiT: Latent Diffusion Transformer Overview</text>

  <rect x="40" y="170" width="150" height="120" rx="18" fill="#FDE68A" stroke="#D97706" stroke-width="2.5"/>
  <text x="76" y="212" class="label">Noisy Latent</text>
  <text x="62" y="238" class="small">z_t in R^(4 x 32 x 32)</text>
  <text x="67" y="260" class="small">for 256x256 image</text>

  <rect x="255" y="170" width="150" height="120" rx="18" fill="#BFDBFE" stroke="#2563EB" stroke-width="2.5"/>
  <text x="299" y="212" class="label">Patchify</text>
  <text x="286" y="238" class="small">patch size p</text>
  <text x="273" y="260" class="small">tokens T = (32/p)^2</text>

  <rect x="470" y="170" width="180" height="120" rx="18" fill="#C7D2FE" stroke="#4F46E5" stroke-width="2.5"/>
  <text x="505" y="212" class="label">Token Embed</text>
  <text x="487" y="238" class="small">Linear to hidden size D</text>
  <text x="493" y="260" class="small">+ 2D sin-cos pos</text>

  <rect x="725" y="120" width="230" height="220" rx="22" fill="#E9D5FF" stroke="#7C3AED" stroke-width="3"/>
  <text x="811" y="155" class="label">N x DiT Blocks</text>
  <text x="775" y="182" class="small">ViT-style backbone on latent tokens</text>

  <rect x="756" y="208" width="168" height="44" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="801" y="236" class="small">Self-Attention</text>

  <rect x="756" y="265" width="168" height="44" rx="12" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="817" y="293" class="small">MLP</text>

  <rect x="1005" y="170" width="160" height="120" rx="18" fill="#FBCFE8" stroke="#DB2777" stroke-width="2.5"/>
  <text x="1041" y="212" class="label">Final Layer</text>
  <text x="1021" y="238" class="small">adaLN + Linear</text>
  <text x="1020" y="260" class="small">to patch outputs</text>

  <rect x="1215" y="170" width="145" height="120" rx="18" fill="#A7F3D0" stroke="#059669" stroke-width="2.5"/>
  <text x="1242" y="212" class="label">Unpatchify</text>
  <text x="1245" y="238" class="small">reshape back</text>
  <text x="1234" y="260" class="small">to latent map</text>

  <rect x="1215" y="360" width="145" height="120" rx="18" fill="#FECACA" stroke="#DC2626" stroke-width="2.5"/>
  <text x="1256" y="402" class="label">Output</text>
  <text x="1234" y="428" class="small">eps_hat or</text>
  <text x="1222" y="450" class="small">[eps_hat, sigma_hat]</text>

  <rect x="470" y="410" width="170" height="84" rx="18" fill="#FEF3C7" stroke="#D97706" stroke-width="2.5"/>
  <text x="507" y="442" class="label">Timestep Emb</text>
  <text x="489" y="466" class="small">sin/cos + MLP -> e_t</text>

  <rect x="690" y="410" width="170" height="84" rx="18" fill="#E0F2FE" stroke="#0284C7" stroke-width="2.5"/>
  <text x="736" y="442" class="label">Label Emb</text>
  <text x="706" y="466" class="small">class y -> e_y, with</text>
  <text x="728" y="484" class="small">dropout for CFG</text>

  <rect x="910" y="410" width="160" height="84" rx="18" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="952" y="442" class="label">Condition c</text>
  <text x="956" y="466" class="small">c = e_t + e_y</text>

  <rect x="220" y="375" width="180" height="150" rx="20" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="2.5"/>
  <text x="277" y="410" class="label">Token Count</text>
  <text x="253" y="438" class="small">p = 2 -> 256 tokens</text>
  <text x="258" y="462" class="small">p = 4 -> 64 tokens</text>
  <text x="258" y="486" class="small">p = 8 -> 16 tokens</text>
  <text x="246" y="512" class="tiny">smaller patch -> more tokens</text>

  <rect x="730" y="370" width="225" height="165" rx="20" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="2.5"/>
  <text x="796" y="402" class="label">adaLN-Zero</text>
  <text x="756" y="430" class="small">condition generates:</text>
  <text x="755" y="454" class="small">shift, scale, gate for MSA</text>
  <text x="755" y="478" class="small">shift, scale, gate for MLP</text>
  <text x="760" y="505" class="tiny">zero init keeps early blocks near identity</text>

  <path d="M191 230 L254 230" class="line"/>
  <path d="M406 230 L469 230" class="line"/>
  <path d="M651 230 L724 230" class="line"/>
  <path d="M956 230 L1004 230" class="line"/>
  <path d="M1166 230 L1214 230" class="line"/>
  <path d="M1288 291 L1288 359" class="line"/>

  <path d="M555 409 L555 290" class="line"/>
  <path d="M775 409 L775 340" class="line"/>
  <path d="M990 409 L990 340" class="line"/>

  <path d="M1070 452 C1120 452, 1130 300, 1120 240" class="dash"/>
  <path d="M990 452 C960 452, 930 390, 840 390" class="dash"/>

  <text x="1032" y="351" class="small" fill="#7C3AED">modulate each block</text>

  <path d="M400 450 C460 450, 500 350, 560 290" class="dash"/>
  <text x="420" y="430" class="tiny" fill="#7C3AED">token count depends on p</text>

  <text x="40" y="585" class="tiny">DiT keeps the diffusion objective, but swaps the U-Net denoiser for a token-based transformer backbone.</text>
</svg>
